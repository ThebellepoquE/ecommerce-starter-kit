name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: |
          echo "Placeholder deploy step."
          echo "Replace this with the real production deployment command(s)."
          echo "Example: trigger your deployment pipeline or run infra/app deploy scripts."

  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: [deploy]
    environment: production
    steps:
      - name: Check production health endpoint
        env:
          PROD_API_URL: ${{ vars.PROD_API_URL }}
        run: |
          if [ -z "$PROD_API_URL" ]; then
            echo "::warning::PROD_API_URL no está definida — se omite el healthcheck de producción."
            echo "Cuando despliegues la API, configura la variable en GitHub:"
            echo "  Settings → Environments → production → Environment variables → PROD_API_URL"
            echo "  (URL base pública, sin barra final; p. ej. https://api.tudominio.com)"
            exit 0
          fi

          HEALTH_URL="${PROD_API_URL%/}/health"
          echo "Checking ${HEALTH_URL}"

          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --max-time 10 "$HEALTH_URL" > /dev/null; then
              echo "Healthcheck passed on attempt ${attempt}."
              exit 0
            fi

            echo "Attempt ${attempt} failed; retrying in 5s..."
            sleep 5
          done

          echo "Healthcheck failed after 5 attempts."
          exit 1
