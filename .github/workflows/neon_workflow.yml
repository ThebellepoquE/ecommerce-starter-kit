name: Neon Branch Workflow

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches: [main]

permissions:
  contents: read

jobs:
  create_neon_branch:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Set branch expiration (14 days)
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch for PR
        id: create_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Print Neon connection details
        run: |
          echo "Created branch: pr-${{ github.event.number }}"
          echo "DB host: ${{ steps.create_branch.outputs.host }}"
          echo "DB URL (masked password): ${{ steps.create_branch.outputs.db_url }}"

  delete_neon_branch:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon branch for PR
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
