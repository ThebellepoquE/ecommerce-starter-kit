packages:
  - apps/*
  - packages/*

# Dependabot / advisories: postcss >=8.5.10 (CVE-2026-41305), @hono/node-server >=1.19.13 (CVE-2026-39406)
overrides:
  postcss: ^8.5.10
  "@hono/node-server": ^1.19.13
allowBuilds:
  '@parcel/watcher': false
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
